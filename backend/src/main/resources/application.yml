# =============================================================
#  Tool-36 — Incident Evidence Locker
#  application.yml — ALL secrets come from environment variables
#  Never put real values here. Values live in .env only.
# =============================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: tool-36-incident-evidence-locker

  # -----------------------------------------------------------
  #  PostgreSQL Database
  # -----------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tool36db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # -----------------------------------------------------------
  #  JPA / Hibernate
  # -----------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema — never let Hibernate change it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # -----------------------------------------------------------
  #  Flyway — Database Migrations
  # -----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # -----------------------------------------------------------
  #  Redis Cache
  # -----------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes in milliseconds (default TTL)
      cache-null-values: false

  # -----------------------------------------------------------
  #  Email — JavaMailSender
  # -----------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # -----------------------------------------------------------
  #  Multipart — file uploads (POST /upload)
  # -----------------------------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# -----------------------------------------------------------
#  JWT Configuration
# -----------------------------------------------------------
jwt:
  secret: ${JWT_SECRET}           # Min 256-bit (32-char) random string
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours default
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

# -----------------------------------------------------------
#  AI Service — Flask microservice on port 5000
# -----------------------------------------------------------
ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:5000}
    timeout-seconds: 10

# -----------------------------------------------------------
#  SpringDoc / Swagger UI
# -----------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

# -----------------------------------------------------------
#  Logging
# -----------------------------------------------------------
logging:
  level:
    root: INFO
    com.internship.tool: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# -----------------------------------------------------------
#  Management / Actuator (optional health checks)
# -----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
